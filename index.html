<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABI 修复工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #171a1f;
      --muted: #646b76;
      --line: #d9dee7;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --danger: #b42318;
      --ok: #087443;
      --code: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1360px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 750;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      border-color: #aeb7c6;
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      min-height: calc(100vh - 150px);
    }

    section {
      display: flex;
      min-height: 520px;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      flex: 1;
      resize: none;
      border: 0;
      outline: 0;
      padding: 14px;
      background: #fbfcfe;
      color: var(--code);
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      tab-size: 2;
    }

    textarea[readonly] {
      background: #ffffff;
    }

    .status {
      min-height: 38px;
      border-top: 1px solid var(--line);
      padding: 9px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      main {
        width: min(100vw - 20px, 720px);
        padding: 14px 0;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      section {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ABI 修复工具</h1>
        <p>粘贴 Chrome DevTools 复制出来的 ABI 数组，转换成可用于合约调用的标准 JSON ABI。</p>
      </div>
      <div class="actions">
        <button class="primary" id="convertBtn" type="button">转换</button>
        <button id="copyBtn" type="button">复制结果</button>
        <button id="clearBtn" type="button">清空</button>
      </div>
    </header>

    <div class="workspace">
      <section>
        <div class="panel-head">
          <h2>原始 ABI 数组</h2>
          <span class="meta" id="inputMeta">0 字符</span>
        </div>
        <textarea id="input" spellcheck="false" placeholder='例如：[{ type: "event", inputs: [{ indexed: !1 }] }]'></textarea>
        <div class="status" id="inputStatus">支持未加引号的 key、!0、!1、尾随逗号。</div>
      </section>

      <section>
        <div class="panel-head">
          <h2>标准 JSON ABI</h2>
          <span class="meta" id="outputMeta">0 条</span>
        </div>
        <textarea id="output" spellcheck="false" readonly></textarea>
        <div class="status" id="outputStatus">转换后可以直接复制到 ethers、viem、web3.js 或区块浏览器。</div>
      </section>
    </div>
  </main>

  <script src="./abi-normalizer.js"></script>
  <script>
    const input = document.querySelector("#input");
    const output = document.querySelector("#output");
    const inputMeta = document.querySelector("#inputMeta");
    const outputMeta = document.querySelector("#outputMeta");
    const inputStatus = document.querySelector("#inputStatus");
    const outputStatus = document.querySelector("#outputStatus");
    const convertBtn = document.querySelector("#convertBtn");
    const copyBtn = document.querySelector("#copyBtn");
    const clearBtn = document.querySelector("#clearBtn");

    function setStatus(element, text, type) {
      element.textContent = text;
      element.className = "status" + (type ? " " + type : "");
    }

    function updateMeta() {
      inputMeta.textContent = input.value.length + " 字符";
      try {
        const parsed = output.value ? JSON.parse(output.value) : [];
        outputMeta.textContent = Array.isArray(parsed) ? parsed.length + " 条" : "0 条";
      } catch {
        outputMeta.textContent = "0 条";
      }
    }

    function convert() {
      try {
        const normalized = AbiNormalizer.normalizeAbiText(input.value);
        output.value = normalized;
        const count = JSON.parse(normalized).length;
        setStatus(inputStatus, "已成功解析输入内容。", "ok");
        setStatus(outputStatus, "已输出 " + count + " 条 ABI 项。", "ok");
      } catch (error) {
        output.value = "";
        setStatus(inputStatus, error.message, "error");
        setStatus(outputStatus, "转换失败，请根据左侧提示修正输入。", "error");
      }
      updateMeta();
    }

    async function copyOutput() {
      if (!output.value) {
        setStatus(outputStatus, "没有可复制的结果。", "error");
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
        setStatus(outputStatus, "已复制到剪贴板。", "ok");
      } catch {
        output.select();
        document.execCommand("copy");
        setStatus(outputStatus, "已复制到剪贴板。", "ok");
      }
    }

    function clearAll() {
      input.value = "";
      output.value = "";
      setStatus(inputStatus, "支持未加引号的 key、!0、!1、尾随逗号。");
      setStatus(outputStatus, "转换后可以直接复制到 ethers、viem、web3.js 或区块浏览器。");
      updateMeta();
      input.focus();
    }

    input.addEventListener("input", updateMeta);
    convertBtn.addEventListener("click", convert);
    copyBtn.addEventListener("click", copyOutput);
    clearBtn.addEventListener("click", clearAll);

    input.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        convert();
      }
    });

    updateMeta();
  </script>
</body>
</html>
